<!DOCTYPE html>
<html>
<head>
    <title>Enter Button</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 30px;
            font-family: Arial, sans-serif;
        }

        .btn {
            background-color: #007BFF;
            color: white;
            font-size: 40px;
            width: 90vw;
            height: 25vh;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <button class="btn" onclick="sendEnter()">ENTER</button>

    <!-- 🔊 Sound file -->
    <audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

    <script>
        function sendEnter() {

            // 🔊 play sound
            document.getElementById("clickSound").play();

            // 🔥 silent request
            var img = new Image();
            img.src = "http://10.80.96.193:5000/enter?rand=" + new Date().getTime();
        }
    </script>

</body>
</html>
