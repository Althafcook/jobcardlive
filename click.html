<!DOCTYPE html>
<html>
<head>
    <title>Enter Button</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 🔥 top */
            padding-top: 30px;
            font-family: Arial, sans-serif;
        }

        .btn {
            background-color: #007BFF;
            color: white;
            font-size: 40px;
            width: 90vw;          /* 🔥 almost full width */
            height: 25vh;         /* 🔥 big height */
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <button class="btn" onclick="sendEnter()">ENTER</button>

    <script>
        function sendEnter() {
            // 🔥 silent request (no error popup)
            var img = new Image();
            img.src = "http://10.80.96.193:5000/enter?rand=" + new Date().getTime();
        }
    </script>

</body>
</html>
