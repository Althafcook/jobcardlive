<!DOCTYPE html>
<html>
<head>
  <title>Jobcard Entry</title>

  <style>
    body { font-family: Arial; padding: 20px; }

    input, button, select {
      padding: 8px;
      font-size: 14px;
      margin-right: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }

    th {
      background-color: #1f4e79;
      color: white;
      padding: 10px;
    }

    td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    .pending {
      background-color: #ffe5e5;
    }

    .given {
      background-color: #e5ffe5;
    }
  </style>
</head>

<body>

<h3>Jobcard Entry</h3>

<!-- 🔹 Input Section -->
<input type="text" id="jobcard" placeholder="Enter Jobcard No" onkeyup="fetchChase()">

<input type="text" id="chasePreview" placeholder="Chase No" readonly>

<button onclick="addRow()">Add</button>

<!-- 🔹 Table -->
<table id="dataTable">
  <thead>
    <tr>
      <th>Date</th>
      <th>Time</th>
      <th>Jobcard No.</th>
      <th>Chase no.</th>
      <th>AIC</th>
      <th>Vehicle</th>
      <th>item1</th>
      <th>Given Status</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- 🔊 Alert Sound -->
<audio id="alertSound" loop>
  <source src="images/alert.mp3" type="audio/mpeg">
</audio>

<script>

let lastFetchedData = {}; // store API data

// 🔥 Fetch Chase Preview
async function fetchChase() {
  let jobcard = document.getElementById("jobcard").value;

  if (jobcard.length < 2) {
    document.getElementById("chasePreview").value = "";
    return;
  }

  let response = await fetch("YOUR_API_URL?jobcard=" + jobcard);
  let data = await response.json();

  lastFetchedData = data;

  document.getElementById("chasePreview").value = data.chase || "";
}


// 🔥 Add Row
function addRow() {
  let jobcard = document.getElementById("jobcard").value;
  let chase = document.getElementById("chasePreview").value;

  if (jobcard === "" || chase === "") {
    alert("Check Jobcard / Chase No");
    return;
  }

  let table = document.getElementById("dataTable").getElementsByTagName('tbody')[0];
  let row = table.insertRow();

  let now = new Date();

  row.insertCell(0).innerHTML = now.toLocaleDateString();
  row.insertCell(1).innerHTML = now.toLocaleTimeString();
  row.insertCell(2).innerHTML = jobcard;
  row.insertCell(3).innerHTML = chase;
  row.insertCell(4).innerHTML = lastFetchedData.aic || "";
  row.insertCell(5).innerHTML = lastFetchedData.vehicle || "";
  row.insertCell(6).innerHTML = "";

  // 🔥 Given Status (Key logic)
  let statusCell = row.insertCell(7);

  statusCell.innerHTML = `
    <select onchange="updateStatus(this)">
      <option value="0">Pending</option>
      <option value="1">Given</option>
    </select>
  `;

  row.classList.add("pending");

  // store timestamp
  row.setAttribute("data-time", now.getTime());

  document.getElementById("jobcard").value = "";
  document.getElementById("chasePreview").value = "";
}


// 🔥 Update Status
function updateStatus(select) {
  let row = select.closest("tr");

  if (select.value == "1") {
    row.classList.remove("pending");
    row.classList.add("given");
  } else {
    row.classList.remove("given");
    row.classList.add("pending");
  }

  checkTimeDiff();
}


// 🔥 Check Time Difference every 10 sec
setInterval(checkTimeDiff, 10000);

function checkTimeDiff() {
  let rows = document.querySelectorAll("#dataTable tbody tr");
  let now = new Date().getTime();
  let alertSound = document.getElementById("alertSound");

  let shouldPlay = false;

  rows.forEach(row => {
    let startTime = parseInt(row.getAttribute("data-time"));
    let diffMinutes = (now - startTime) / 60000;

    let select = row.cells[7].querySelector("select");
    let key = select.value;

    if (key == "0" && diffMinutes > 30) {
      shouldPlay = true;
    }
  });

  if (shouldPlay) {
    alertSound.play();
  } else {
    alertSound.pause();
    alertSound.currentTime = 0;
  }
}

</script>

</body>
</html>
