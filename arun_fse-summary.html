<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arun FSE Summary</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Segoe UI,Arial;
  padding:15px;
}

.wrapper{
  width:100%;
  max-width:1200px;
  margin:auto;
}

h2{
  margin-bottom:15px;
  font-weight:500;
  text-align:center;
}

.chart-box{
  background:#111;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* mobile scroll */
.chart-scroll{
  overflow-x:auto;
}

canvas{
  cursor:pointer;
}

</style>
</head>

<body>

<div class="wrapper">

<h2>FSE Pending Summary</h2>

<div class="chart-box">
<div class="chart-scroll">
<canvas id="fseChart"></canvas>
</div>
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec?mode=arun_fse_summary";


async function loadGraph(){

  const res = await fetch(API_URL,{cache:"no-store"});
  const data = await res.json();

  const labels = [];
  const below = [];
  const above = [];

  data.forEach(r=>{
    labels.push(r.fse);
    below.push(r.below60);
    above.push(r.above60);
  });


  const canvas = document.getElementById("fseChart");

  /* 🔥 Dynamic height for all executives */
  canvas.height = labels.length * 45;

  const ctx = canvas.getContext("2d");


  /* plugin to draw values under bars */

  const valuePlugin = {
    id:"valuePlugin",
    afterDatasetsDraw(chart){

      const {ctx} = chart;

      chart.data.datasets.forEach((dataset,i)=>{

        const meta = chart.getDatasetMeta(i);

        meta.data.forEach((bar,index)=>{

          const value = dataset.data[index];

          ctx.fillStyle="#ccc";
          ctx.font="11px Segoe UI";
          ctx.textAlign="center";

          ctx.fillText(
            value,
            bar.x,
            bar.y + 12
          );

        });

      });

    }
  };


  const chart = new Chart(ctx,{

    type:"bar",

    data:{
      labels:labels,
      datasets:[
        {
          label:"Below 60 days",
          data:below,
          backgroundColor:"#2ea8ff",
          borderRadius:4,
          barThickness:16
        },
        {
          label:"Above 60 days",
          data:above,
          backgroundColor:"#ff4d4d",
          borderRadius:4,
          barThickness:16
        }
      ]
    },

    options:{

      indexAxis:'y',

      responsive:true,
      maintainAspectRatio:false,

      animation:{
        duration:900
      },

      layout:{
        padding:{
          bottom:20
        }
      },

      scales:{

        x:{
          stacked:true,
          ticks:{
            color:"#aaa"
          },
          grid:{
            color:"#222"
          }
        },

        y:{
          stacked:true,
          ticks:{
            color:"#fff",
            font:{
              size:12
            }
          },
          grid:{
            display:false
          }
        }

      },

      plugins:{

        legend:{
          position:"top",
          labels:{
            color:"#fff",
            boxWidth:14
          }
        },

        tooltip:{
          backgroundColor:"#111"
        }

      },


      /* click executive */

      onClick:(evt,items)=>{

        if(items.length){

          const index = items[0].index;
          const fse = labels[index];

          location.href =
          "arun_fse_detail.html?fse=" + encodeURIComponent(fse);

        }

      }

    },

    plugins:[valuePlugin]

  });

}

loadGraph();

</script>

</body>
</html>
