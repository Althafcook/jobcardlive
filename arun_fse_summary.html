<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSE Pending Summary</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Segoe UI,Arial;
padding:20px;
}

.wrapper{
max-width:1100px;
margin:auto;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.left-head{
display:flex;
align-items:center;
gap:15px;
}

.title{
font-size:24px;
font-weight:500;
}

.summary{
display:flex;
gap:15px;
align-items:flex-start;
}

.summary-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#fff;
}

.summary-label{
margin-bottom:4px;
}

.box{
padding:4px 10px;
border-radius:6px;
font-size:16px;
font-weight:600;
line-height:1.2;
}

.total-box{
background:#fdb913;
color:#000;
}

.below-box{
background:#1e73ff;
color:#fff;
}

.above-box{
background:#ff1e1e;
color:#fff;
}

.accuracy-box{
display:flex;
flex-direction:column;
align-items:center;
}

.accuracy-title{
font-size:12px;
color:#aaa;
}

.accuracy-circle{
width:60px;
height:60px;
}

.legend{
text-align:center;
font-size:13px;
color:#aaa;
margin-bottom:25px;
}

.legend span{
margin:0 10px;
}

.bluebox,
.redbox{
display:inline-block;
width:12px;
height:12px;
margin-right:6px;
}

.bluebox{background:#1e73ff;}
.redbox{background:#ff1e1e;}

.row{
display:flex;
margin-bottom:30px;
align-items:flex-start;
cursor:pointer;
}

.name{
width:210px;
font-size:15px;
font-weight:500;
}

.total{
font-size:12px;
color:#aaa;
margin-top:3px;
}

.bar-area{
flex:1;
width:100%;
}

.bar{
height:18px;
position:relative;
margin:0;
width:100%;
}

.blue{
background:#1e73ff;
height:100%;
border-radius:3px;
}

.red{
background:#ff1e1e;
height:100%;
border-radius:3px;
}

.value{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:13px;
margin-left:4px;
white-space:nowrap;
}

#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:22px;
z-index:999;
}

.loader-sub{
font-size:16px;
color:#aaa;
margin-top:6px;
}

@media(max-width:700px){

.header{
flex-direction:column;
align-items:center;
gap:10px;
}

.summary{
justify-content:center;
flex-wrap:wrap;
}

.name{
width:100%;
margin-bottom:10px;
}

.row{
flex-direction:column;
}

}

</style>
</head>

<body>

<div id="loader">
<div id="percent">Loading... 0%</div>
<div class="loader-sub" id="seconds">(0s)</div>
</div>

<div class="wrapper" id="content" style="display:none">

<!-- existing HTML unchanged -->

<div id="chart"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec";

const chart=document.getElementById("chart");

let percent=0;
let seconds=0;

const loader=document.getElementById("loader");
const content=document.getElementById("content");
const percentText=document.getElementById("percent");
const secondsText=document.getElementById("seconds");

let loaderTimer;
let secondTimer;

function startLoader(){

loader.style.display="flex";
content.style.display="none";

percent=0;
seconds=0;

loaderTimer=setInterval(()=>{
percent+=3;
if(percent>95) percent=95;
percentText.innerText="Loading... "+percent+"%";
},60);

secondTimer=setInterval(()=>{
seconds++;
secondsText.innerText="("+seconds+"s)";
},1000);

}

function stopLoader(){

clearInterval(loaderTimer);
clearInterval(secondTimer);

loader.style.display="none";
content.style.display="block";

}

function format(num){
return Number(num).toLocaleString('en-IN');
}

/* existing render / accuracy / load functions unchanged */

async function load(first=false){

if(first) startLoader();

const res=await fetch(API+"?mode=arun_fse_summary",{cache:"no-store"});
const json=await res.json();

sessionStorage.setItem("arunFseSummary",JSON.stringify(json));

render(json.data);
drawAccuracy(json.accuracy);

if(first) stopLoader();

}

/* PAGE START */

const cache=sessionStorage.getItem("arunFseSummary");

if(cache){

const json=JSON.parse(cache);

render(json.data);
drawAccuracy(json.accuracy);

loader.style.display="none";
content.style.display="block";

}else{

load(true);

}

/* AUTO REFRESH */

setInterval(()=>{
load(false);
},30000);

/* ✅ BACK BUTTON LOADER FIX */

window.addEventListener("pageshow",function(){

loader.style.display="none";
content.style.display="block";

clearInterval(loaderTimer);
clearInterval(secondTimer);

});

</script>

</body>
</html>
