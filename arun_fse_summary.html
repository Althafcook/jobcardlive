<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arun FSE Summary</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Segoe UI,Arial;
  padding:15px;
}

.wrapper{
  width:100%;
  max-width:1200px;
  margin:auto;
}

h2{
  margin-bottom:15px;
  font-weight:500;
  text-align:center;
}

.chart-box{
  background:#111;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.chart-scroll{
  overflow-x:auto;
}

canvas{
  cursor:pointer;
}

</style>
</head>

<body>

<div class="wrapper">

<h2>FSE Pending Summary</h2>

<div class="chart-box">
<div class="chart-scroll">
<canvas id="fseChart"></canvas>
</div>
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec?mode=arun_fse_summary";


async function loadGraph(){

  const res = await fetch(API_URL,{cache:"no-store"});
  const data = await res.json();

  const labels = [];
  const below = [];
  const above = [];
  const total = [];

  data.forEach(r=>{
    labels.push(r.fse);
    below.push(r.below60);
    above.push(r.above60);
    total.push(r.below60 + r.above60);
  });


  const canvas = document.getElementById("fseChart");

  /* auto height based on executives */
  canvas.height = labels.length * 48;

  const ctx = canvas.getContext("2d");


  /* value box plugin */

  const valuePlugin = {
    id:"valuePlugin",

    afterDatasetsDraw(chart){

      const {ctx} = chart;

      const metaBelow = chart.getDatasetMeta(0);

      metaBelow.data.forEach((bar,index)=>{

        const x = bar.x + 10;
        const y = bar.y;

        const belowVal = below[index];
        const aboveVal = above[index];
        const totalVal = total[index];

        function drawBox(text,color,offset){

          ctx.fillStyle=color;
          ctx.fillRect(x + offset, y-10, 55, 18);

          ctx.fillStyle="#fff";
          ctx.font="11px Segoe UI";
          ctx.textAlign="center";
          ctx.fillText(text, x + offset + 27, y+3);

        }

        drawBox(belowVal,"#2ea8ff",0);
        drawBox(aboveVal,"#ff4d4d",60);
        drawBox(totalVal,"#000",120);

      });

    }
  };


  new Chart(ctx,{

    type:"bar",

    data:{
      labels:labels,
      datasets:[
        {
          data:below,
          backgroundColor:"#2ea8ff",
          borderRadius:4,
          barThickness:18
        },
        {
          data:above,
          backgroundColor:"#ff4d4d",
          borderRadius:4,
          barThickness:18
        }
      ]
    },

    options:{

      indexAxis:'y',

      responsive:true,
      maintainAspectRatio:false,

      animation:{
        duration:900
      },

      scales:{

        x:{
          stacked:true,
          display:false
        },

        y:{
          stacked:true,
          ticks:{
            color:"#fff",
            font:{
              size:12
            }
          },
          grid:{
            display:false
          }
        }

      },

      plugins:{
        legend:{display:false},
        tooltip:{enabled:false}
      },


      /* click executive */

      onClick:(evt,items)=>{

        if(items.length){

          const index = items[0].index;
          const fse = labels[index];

          location.href =
          "arun_fse_detail.html?fse=" + encodeURIComponent(fse);

        }

      }

    },

    plugins:[valuePlugin]

  });

}

loadGraph();

</script>

</body>
</html>
