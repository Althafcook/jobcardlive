<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSE Pending Summary</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Segoe UI,Arial;
padding:20px;
}

.wrapper{
max-width:1100px;
margin:auto;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
}

.left-head{
display:flex;
align-items:center;
gap:15px;
}

.title{
font-size:24px;
font-weight:500;
}

/* SUMMARY */

.summary{
display:flex;
gap:15px;
align-items:flex-start;
}

.summary-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:#fff;
}

.summary-label{
margin-bottom:4px;
}

.box{
padding:4px 10px;
border-radius:6px;
font-size:16px;
font-weight:600;
line-height:1.2;
}

.total-box{
background:#fdb913;
color:#000;
}

.below-box{
background:#1e73ff;
color:#fff;
}

.above-box{
background:#ff1e1e;
color:#fff;
}

/* ACCURACY */

.accuracy-box{
display:flex;
flex-direction:column;
align-items:center;
}

.accuracy-title{
font-size:12px;
color:#aaa;
}

.accuracy-circle{
width:60px;
height:60px;
}

/* LEGEND */

.legend{
text-align:center;
font-size:13px;
color:#aaa;
margin-bottom:25px;
}

.legend span{
margin:0 10px;
}

.bluebox,
.redbox{
display:inline-block;
width:12px;
height:12px;
margin-right:6px;
}

.bluebox{background:#1e73ff;}
.redbox{background:#ff1e1e;}

/* ROW */

.row{
display:flex;
margin-bottom:30px;
align-items:flex-start;
cursor:pointer;
}

.name{
width:210px;
font-size:15px;
font-weight:500;
}

.total{
font-size:12px;
color:#aaa;
margin-top:3px;
}

/* BAR */

.bar-area{
flex:1;
width:100%;
}

.bar{
height:18px;
position:relative;
margin:0;
width:100%;
}

.blue{
background:#1e73ff;
height:100%;
border-radius:3px;
}

.red{
background:#ff1e1e;
height:100%;
border-radius:3px;
}

.value{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:13px;
margin-left:4px;
white-space:nowrap;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:22px;
z-index:999;
}

.loader-sub{
font-size:15px;
color:red;
margin-top:10px;
}

/* MOBILE */

@media(max-width:700px){

.header{
flex-direction:column;
align-items:center;
gap:10px;
}

.summary{
justify-content:center;
flex-wrap:wrap;
}

.name{
width:100%;
margin-bottom:10px;
}

.row{
flex-direction:column;
}

}

</style>
</head>

<body>

<div id="loader">
<div id="percent">Loading...</div>
<div class="loader-sub">(First opening may take a few seconds… please wait)</div>
</div>

<div class="wrapper" id="content" style="display:none">

<!-- existing HTML unchanged -->

<div id="chart"></div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec";

const chart=document.getElementById("chart");

function format(num){
return Number(num).toLocaleString('en-IN');
}

/* RENDER */

function render(data){

chart.innerHTML="";

let max=0;
let totalBelow=0;
let totalAbove=0;

data.forEach(r=>{

if(r.fse==="Executive") return;

let total=r.below60+r.above60;

if(total>max) max=total;

totalBelow+=r.below60;
totalAbove+=r.above60;

});

let totalAll=totalBelow+totalAbove;

totalBox.innerText=format(totalAll);
belowBox.innerText=format(totalBelow);
aboveBox.innerText=format(totalAbove);

data.forEach(r=>{

if(r.fse==="Executive") return;

const total=r.below60+r.above60;

let bluePercent=(r.below60/max)*100;
let redPercent=(r.above60/max)*100;

let blueWidth=Math.max(bluePercent,0.8);
let redWidth=Math.max(redPercent,0.8);

let blueStyleWidth = r.below60===0 ? "1px" : blueWidth+"%";
let redStyleWidth  = r.above60===0 ? "1px" : redWidth+"%";

let blueColor = r.below60===0 ? "#666" : "#1e73ff";
let redColor  = r.above60===0 ? "#666" : "#ff1e1e";

const row=document.createElement("div");
row.className="row";

row.onclick=async()=>{

await fetch(API+"?mode=set_fse&name="+encodeURIComponent(r.fse));

location.href="arun_fse_detail.html";

};

row.innerHTML=`

<div class="name">
${r.fse}
<div class="total">(${format(total)})</div>
</div>

<div class="bar-area">

<div class="bar">
<div class="blue" style="width:${blueStyleWidth};background:${blueColor}"></div>
<div class="value" style="left:${blueStyleWidth}">${format(r.below60)}</div>
</div>

<div class="bar">
<div class="red" style="width:${redStyleWidth};background:${redColor}"></div>
<div class="value" style="left:${redStyleWidth}">${format(r.above60)}</div>
</div>

</div>
`;

chart.appendChild(row);

});

}

/* ACCURACY */

function drawAccuracy(value){

const ring=document.getElementById("accuracyRing");
const text=document.getElementById("accuracyText");

const radius=52;
const circumference=2*Math.PI*radius;

const offset=circumference-(value/100)*circumference;

ring.style.strokeDasharray=circumference;
ring.style.strokeDashoffset=offset;

let color="red";

if(value>=80) color="#00ff7f";
else if(value>=50) color="#ffc107";

ring.style.stroke=color;

text.textContent=value+"%";

}

/* LOAD DATA */

async function fetchData(){

try{

const res=await fetch(API+"?mode=arun_fse_summary",{cache:"no-store"});
const json=await res.json();

sessionStorage.setItem("arunFseSummary",JSON.stringify(json));

render(json.data);
drawAccuracy(json.accuracy);

}catch(e){
console.log("API slow, using cache");
}

}

/* PAGE START */

const cache=sessionStorage.getItem("arunFseSummary");

if(cache){

const json=JSON.parse(cache);

render(json.data);
drawAccuracy(json.accuracy);

loader.style.display="none";
content.style.display="block";

fetchData();

}else{

fetchData().then(()=>{

loader.style.display="none";
content.style.display="block";

});

}

/* AUTO REFRESH */

setInterval(fetchData,30000);

</script>

</body>
</html>
