<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSE Pending Summary</title>

<style>

body{
margin:0;
background:#000;
font-family:Segoe UI,Arial;
color:#fff;
padding:15px;
}

.wrapper{
max-width:1000px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:500;
}

/* loader */

#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:20px;
}

.loader-sub{
font-size:14px;
margin-top:10px;
color:#aaa;
}

/* chart */

.row{
margin-bottom:25px;
}

.name{
font-size:18px;
margin-bottom:6px;
}

.total{
font-size:15px;
color:#bbb;
}

.barbox{
position:relative;
height:22px;
background:#111;
border-radius:4px;
overflow:hidden;
}

.blue{
position:absolute;
left:0;
top:0;
bottom:0;
background:#1e73ff;
}

.red{
position:absolute;
top:0;
bottom:0;
background:#ff1e1e;
}

.val{
position:absolute;
right:6px;
top:50%;
transform:translateY(-50%);
font-size:13px;
}

</style>
</head>

<body>

<div id="loader">
<div id="percent">0%</div>
<div class="loader-sub">Loading... 0s</div>
</div>

<div class="wrapper" id="content" style="display:none">

<h2>FSE Pending Summary</h2>

<div id="chart"></div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec?mode=arun_fse_summary";

const chart = document.getElementById("chart");

let loaderInterval;
let sec=0;

/* loader */

function showLoader(){

let p=0;

loaderInterval=setInterval(()=>{
p+=2;
if(p>90)p=90;
percent.textContent=p+"%";
},50);

setInterval(()=>{
sec++;
document.querySelector(".loader-sub").textContent="Loading... "+sec+"s";
},1000);

}

/* hide loader */

function hideLoader(){

clearInterval(loaderInterval);

percent.textContent="100%";

setTimeout(()=>{
loader.style.display="none";
content.style.display="block";
},300);

}

/* render */

function render(data){

chart.innerHTML="";

let max=0;

data.forEach(r=>{
let t=r.below60+r.above60;
if(t>max)max=t;
});

data.forEach(r=>{

const total=r.below60+r.above60;

const blueWidth=(r.below60/max)*100;
const redWidth=(r.above60/max)*100;

const row=document.createElement("div");
row.className="row";

row.innerHTML=`

<div class="name">
${r.fse}
<span class="total">(${total})</span>
</div>

<div class="barbox">

<div class="blue" style="width:${blueWidth}%">
<span class="val">${r.below60}</span>
</div>

<div class="red" style="left:${blueWidth}%;width:${redWidth}%">
<span class="val">${r.above60}</span>
</div>

</div>

`;

row.onclick=()=>{
location.href="arun_fse_detail.html?fse="+encodeURIComponent(r.fse);
};

chart.appendChild(row);

});

}

/* load data */

async function load(){

showLoader();

const r=await fetch(API,{cache:"no-store"});
const data=await r.json();

render(data);

hideLoader();

}

/* back cache fix */

window.addEventListener("pageshow",e=>{
if(e.persisted){
content.style.display="block";
loader.style.display="none";
}
});

load();

</script>

</body>
</html>
