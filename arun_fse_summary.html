<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSE Pending Summary</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Segoe UI,Arial;
padding:20px;
}

.wrapper{
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
font-weight:500;
margin-bottom:8px;
font-size:22px;
}

/* legend */

.legend{
text-align:center;
font-size:13px;
color:#aaa;
margin-bottom:25px;
}

.legend span{
margin:0 10px;
}

.bluebox,
.redbox{
display:inline-block;
width:12px;
height:12px;
margin-right:6px;
}

.bluebox{background:#1e73ff;}
.redbox{background:#ff1e1e;}


/* loader */

#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:20px;
}

.loader-sub{
font-size:13px;
color:#888;
margin-top:5px;
}


/* rows */

.row{
display:flex;
margin-bottom:30px;
align-items:flex-start;
}

.name{
width:230px;
font-size:17px;
font-weight:500;
}

.total{
font-size:13px;
color:#aaa;
margin-top:3px;
}


/* bars */

.bar-area{
flex:1;
}

.bar{
height:18px;
position:relative;
margin-bottom:6px;
}

.blue{
background:#1e73ff;
height:100%;
border-radius:3px;
}

.red{
background:#ff1e1e;
height:100%;
border-radius:3px;
}

.value{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:13px;
color:#fff;
margin-left:3px;
white-space:nowrap;
}


/* responsive */

@media(max-width:700px){

.row{
flex-direction:column;
}

.name{
width:100%;
margin-bottom:10px;
}

}

</style>
</head>

<body>


<div id="loader">
<div id="percent">0%</div>
<div class="loader-sub">Loading... 0s</div>
</div>


<div class="wrapper" id="content" style="display:none">

<h2>FSE Pending Summary</h2>

<div class="legend">
<span><span class="bluebox"></span>Below 60 days</span>
<span><span class="redbox"></span>Above 60 days</span>
</div>

<div id="chart"></div>

</div>


<script>

const API =
"https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec?mode=arun_fse_summary";

const chart=document.getElementById("chart");

let sec=0;
let percent=0;


/* loader animation */

const loadInterval=setInterval(()=>{
percent+=3;
if(percent>90)percent=90;
document.getElementById("percent").textContent=percent+"%";
},60);

setInterval(()=>{
sec++;
document.querySelector(".loader-sub").textContent="Loading... "+sec+"s";
},1000);



function render(data){

chart.innerHTML="";

let max=0;

data.forEach(r=>{
if(r.fse==="Executive") return;
let total=r.below60+r.above60;
if(total>max)max=total;
});


data.forEach(r=>{

if(r.fse==="Executive") return;

const total=r.below60+r.above60;

const blueWidth=(r.below60/max)*100;
const redWidth=(r.above60/max)*100;

const row=document.createElement("div");
row.className="row";

row.innerHTML=`

<div class="name">
${r.fse}
<div class="total">(${total})</div>
</div>

<div class="bar-area">

<div class="bar">
<div class="blue" style="width:${blueWidth}%"></div>
<div class="value" style="left:${blueWidth}%">${r.below60}</div>
</div>

<div class="bar">
<div class="red" style="width:${redWidth}%"></div>
<div class="value" style="left:${redWidth}%">${r.above60}</div>
</div>

</div>

`;

row.onclick=()=>{
location.href="arun_fse_detail.html?fse="+encodeURIComponent(r.fse);
};

chart.appendChild(row);

});

}



/* load data */

async function load(){

const res=await fetch(API,{cache:"no-store"});
const data=await res.json();

render(data);

clearInterval(loadInterval);

document.getElementById("percent").textContent="100%";

setTimeout(()=>{
loader.style.display="none";
content.style.display="block";
},300);

}


/* back cache fix */

window.addEventListener("pageshow",e=>{
if(e.persisted){
loader.style.display="none";
content.style.display="block";
}
});

load();

</script>

</body>
</html>
