<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSE Pending Summary</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Segoe UI,Arial;
padding:15px;
}

.wrapper{
max-width:1100px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:20px;
font-weight:500;
}

/* loader */

#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:22px;
}

.loader-sub{
font-size:14px;
color:#aaa;
margin-top:6px;
}

/* rows */

.row{
display:flex;
align-items:flex-start;
margin-bottom:30px;
}

.name{
width:220px;
font-size:18px;
}

.total{
font-size:15px;
color:#bbb;
margin-top:4px;
}

/* bars */

.bar-area{
flex:1;
}

.bar{
position:relative;
height:22px;
margin-bottom:6px;
background:#222;
border-radius:4px;
}

.blue{
background:#1e73ff;
height:100%;
border-radius:4px;
}

.red{
background:#ff1e1e;
height:100%;
border-radius:4px;
}

.value{
position:absolute;
right:-55px;
top:50%;
transform:translateY(-50%);
font-size:14px;
}

/* responsive */

@media(max-width:700px){

.row{
flex-direction:column;
}

.name{
width:100%;
margin-bottom:8px;
}

.value{
right:-45px;
}

}

</style>
</head>

<body>

<div id="loader">
<div id="percent">0%</div>
<div class="loader-sub">Loading... 0s</div>
</div>

<div class="wrapper" id="content" style="display:none">

<h2>FSE Pending Summary</h2>

<div id="chart"></div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec?mode=arun_fse_summary";

const chart=document.getElementById("chart");

let sec=0;
let percent=0;

/* loader */

const loadInterval=setInterval(()=>{
percent+=3;
if(percent>90)percent=90;
document.getElementById("percent").textContent=percent+"%";
},60);

setInterval(()=>{
sec++;
document.querySelector(".loader-sub").textContent="Loading... "+sec+"s";
},1000);


/* render bars */

function render(data){

chart.innerHTML="";

let max=0;

data.forEach(r=>{
let t=r.below60+r.above60;
if(t>max)max=t;
});

data.forEach(r=>{

const total=r.below60+r.above60;

const blueWidth=(r.below60/max)*100;
const redWidth=(r.above60/max)*100;

const row=document.createElement("div");
row.className="row";

row.innerHTML=`

<div class="name">
${r.fse}
<div class="total">(${total})</div>
</div>

<div class="bar-area">

<div class="bar">
<div class="blue" style="width:${blueWidth}%"></div>
<div class="value">${r.below60}</div>
</div>

<div class="bar">
<div class="red" style="width:${redWidth}%"></div>
<div class="value">${r.above60}</div>
</div>

</div>

`;

row.onclick=()=>{
location.href="arun_fse_detail.html?fse="+encodeURIComponent(r.fse);
};

chart.appendChild(row);

});

}


/* load data */

async function load(){

const res=await fetch(API,{cache:"no-store"});
const data=await res.json();

render(data);

clearInterval(loadInterval);

document.getElementById("percent").textContent="100%";

setTimeout(()=>{
loader.style.display="none";
content.style.display="block";
},300);

}


/* back cache fix */

window.addEventListener("pageshow",e=>{
if(e.persisted){
loader.style.display="none";
content.style.display="block";
}
});

load();

</script>

</body>
</html>
