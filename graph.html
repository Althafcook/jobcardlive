<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Dashboard</title>

<style>

body{
margin:0;
background:linear-gradient(180deg,#1f3b63,#243f6e);
font-family:Segoe UI,Arial;
color:#fff;
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.date{
color:#00ff99;
font-size:16px;
}

.total{
font-size:30px;
font-weight:600;
margin-top:5px;
}

.legend{
display:flex;
gap:20px;
font-size:14px;
}

.legend span{
display:flex;
align-items:center;
gap:8px;
}

.box{
width:14px;
height:14px;
border-radius:3px;
}

.blue{background:#4e79ff;}
.red{background:#ff2d2d;}

/* LOADER */

.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:16px;
color:#aaa;
}

/* CHART */

.chart{
position:relative;
height:200px; /* 🔥 50% reduced */
margin-top:40px;
}

/* GROUND LINE */

.chart::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:40px;
height:2px;
background:rgba(255,255,255,0.4);
}

/* GRID */

.chart::before{
content:"";
position:absolute;
left:0;
right:0;
top:0;
bottom:40px;
background:repeating-linear-gradient(
to top,
rgba(255,255,255,0.08),
rgba(255,255,255,0.08) 1px,
transparent 1px,
transparent 30px
);
}

/* GROUP */

.bar-group{
position:absolute;
bottom:40px;
transform:translateX(-50%);
display:flex;
flex-direction:column;
align-items:center;
}

.bar-group:nth-child(1){ left:12%; }
.bar-group:nth-child(2){ left:37%; }
.bar-group:nth-child(3){ left:62%; }
.bar-group:nth-child(4){ left:87%; }

/* BARS */

.bars{
display:flex;
gap:0;
align-items:flex-end;
height:140px; /* 🔥 half */
}

/* BAR */

.bar{
width:28px; /* 🔥 reduced */
border-radius:6px 6px 0 0;
position:relative;
box-shadow:0 4px 8px rgba(0,0,0,0.4);
}

.bar.blue{
background:linear-gradient(to top,#3f6df0,#6f95ff);
}

.bar.red{
background:linear-gradient(to top,#d91c1c,#ff3b3b);
}

/* VALUE */

.value{
position:absolute;
top:-18px;
font-size:10px;
white-space:nowrap;
}

/* LABEL */

.label{
position:absolute;
top:150px;
text-align:center;
}

.name{
font-size:12px;
color:#ddd;
}

.sum{
font-size:11px;
color:#aaa;
margin-top:2px;
}

</style>
</head>

<body>

<div class="header">

<div>
<div class="date" id="date">--</div>
<div>Bill pending value</div>
<div class="total" id="total">₹0</div>
</div>

<div class="legend">
<span><div class="box red"></div>Above 60 days</span>
<span><div class="box blue"></div>Below 60 days</span>
</div>

</div>

<div class="chart" id="chart">
<div class="loader" id="loader">Loading... 0s</div>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw7TsP6W-x_FLzj5pHNbYag-S9aq7Gg6r3PcVfI006HZc1BmkOoBswBIvW00VqGRi3Y/exec?mode=graph_data";

let seconds = 0;
let timer;

function format(num){
return Number(num).toLocaleString('en-IN');
}

function startLoader(){
seconds = 0;
const loader = document.getElementById("loader");
loader.style.display = "block";

timer = setInterval(()=>{
seconds++;
loader.innerText = "Loading... " + seconds + "s";
},1000);
}

function stopLoader(){
clearInterval(timer);
document.getElementById("loader").style.display = "none";
}

async function load(){

startLoader();

try{

const res = await fetch(API);
if(!res.ok) throw new Error("API error");

const data = await res.json();

const chart = document.getElementById("chart");

let max = 0;
let total = 0;

data.forEach(r=>{

const below = r.above;
const above = r.below;

const t = above + below;

if(t > max) max = t;
total += t;

});

if(max === 0){
chart.innerHTML = "<div>No data</div>";
return;
}

document.getElementById("total").innerText = "₹"+format(total);

/* 🔥 KEEP OLD GRAPH (no blank flicker) */
const oldGroups = chart.querySelectorAll(".bar-group");
oldGroups.forEach(e=>e.remove());

data.forEach((r,i)=>{

const below = r.above;
const above = r.below;

const blueHeight = (below / max) * 140;
const redHeight  = (above / max) * 140;

const div = document.createElement("div");
div.className = "bar-group";

div.innerHTML = `

<div class="bars">

<div class="bar blue" style="height:${blueHeight}px">
<div class="value">${format(below)}</div>
</div>

<div class="bar red" style="height:${redHeight}px">
<div class="value">${format(above)}</div>
</div>

</div>

<div class="label">
<div class="name">${r.name}</div>
<div class="sum">${format(above + below)}</div>
</div>

`;

chart.appendChild(div);

});

document.getElementById("date").innerText =
new Date().toDateString();

stopLoader();

}catch(err){

document.getElementById("chart").innerHTML =
"<div style='color:red'>Failed to load data</div>";

}

}

load();

/* 🔥 AUTO REFRESH (silent) */
setInterval(load,30000);

</script>

</body>
</html>
