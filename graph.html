<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Dashboard</title>

<style>

body{
margin:0;
background:#1f3b63;
font-family:Segoe UI,Arial;
color:#fff;
padding:20px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.date{
color:#00ff99;
font-size:16px;
}

.total{
font-size:28px;
font-weight:600;
margin-top:5px;
}

.legend{
display:flex;
gap:20px;
font-size:14px;
}

.legend span{
display:flex;
align-items:center;
gap:8px;
}

.box{
width:14px;
height:14px;
border-radius:3px;
}

.blue{background:#4e79ff;}
.red{background:#ff2d2d;}

/* CHART */

.chart{
display:flex;
justify-content:space-around;
align-items:flex-end;
height:300px;
margin-top:40px;
border-bottom:2px solid rgba(255,255,255,0.4);
}

/* GROUP */

.bar-group{
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
height:100%;
}

/* 🔥 IMPORTANT FIX */

.bars{
display:flex;
gap:14px;
align-items:flex-end;
height:260px; /* fixed baseline area */
}

/* BAR */

.bar{
width:42px;
border-radius:6px 6px 0 0;
position:relative;
}

/* COLORS */

.bar.blue{background:#4e79ff;}
.bar.red{background:#ff2d2d;}

/* VALUE */

.value{
position:absolute;
top:-22px;
font-size:12px;
white-space:nowrap;
}

/* LABEL */

.label{
margin-top:8px;
text-align:center;
}

.name{
font-size:14px;
color:#ddd;
}

.sum{
font-size:13px;
color:#aaa;
margin-top:3px;
}

</style>
</head>

<body>

<div class="header">

<div>
<div class="date" id="date">--</div>
<div>Bill pending value</div>
<div class="total" id="total">₹0</div>
</div>

<div class="legend">
<span><div class="box red"></div>Above 60 days</span>
<span><div class="box blue"></div>Below 60 days</span>
</div>

</div>

<div class="chart" id="chart"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbw7TsP6W-x_FLzj5pHNbYag-S9aq7Gg6r3PcVfI006HZc1BmkOoBswBIvW00VqGRi3Y/exec?mode=graph_data";

function format(num){
return Number(num).toLocaleString('en-IN');
}

async function load(){

try{

const res = await fetch(API);
if(!res.ok) throw new Error("API error");

const data = await res.json();

const chart = document.getElementById("chart");

let max = 0;
let total = 0;

data.forEach(r=>{
const t = r.above + r.below;
if(t > max) max = t;
total += t;
});

if(max === 0){
chart.innerHTML = "<div>No data</div>";
return;
}

document.getElementById("total").innerText = "₹"+format(total);

chart.innerHTML = "";

data.forEach(r=>{

/* ✅ FIX: correct mapping */
const below = r.below; // BLUE
const above = r.above; // RED

const blueHeight = (below / max) * 260;
const redHeight  = (above / max) * 260;

const div = document.createElement("div");
div.className = "bar-group";

div.innerHTML = `

<div class="bars">

<!-- BLUE LEFT -->
<div class="bar blue" style="height:${blueHeight}px">
<div class="value">${format(below)}</div>
</div>

<!-- RED RIGHT -->
<div class="bar red" style="height:${redHeight}px">
<div class="value">${format(above)}</div>
</div>

</div>

<div class="label">
<div class="name">${r.name}</div>
<div class="sum">${format(above + below)}</div>
</div>

`;

chart.appendChild(div);

});

document.getElementById("date").innerText =
new Date().toDateString();

}catch(err){

document.getElementById("chart").innerHTML =
"<div style='color:red'>Failed to load data</div>";

}

}

load();

</script>

</body>
</html>
