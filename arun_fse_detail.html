<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSE Pending Detail</title>

<style>

body{
margin:0;
background:#000;
color:#e0e0e0;
font-family:Segoe UI,Arial;
padding:20px;
}

.wrapper{
max-width:1100px;
margin:auto;
}

/* HEADER */

.title{
font-size:22px;
margin-bottom:10px;
text-align:center;
font-weight:600;
letter-spacing:.5px;
}

.total{
text-align:center;
font-size:16px;
margin-bottom:20px;
color:#ff5252;
font-weight:600;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
text-align:left;
border-bottom:1px solid #222;
font-size:12px;
color:#cfcfcf;
}

th{
background:#0d47a1;
color:#fff;
font-weight:500;
}

tr{
cursor:pointer;
transition:.15s;
}

tr:hover{
background:#111;
}

.number{
width:40px;
text-align:center;
color:#aaa;
}

.age{
text-align:center;
}

.amount{
text-align:right;
color:#ff4d4d;
font-weight:500;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
letter-spacing:.5px;
}

/* MOBILE */

@media(max-width:700px){

th,td{
padding:7px;
font-size:12px;
}

}

</style>
</head>

<body>

<div id="loader">Loading...</div>

<div class="wrapper" id="content" style="display:none">

<div class="title">FSE Pending Detail</div>

<div class="total" id="totalAmount">Total : ₹0</div>

<table>

<thead>

<tr>
<th>#</th>
<th>Age</th>
<th>AIC</th>
<th>Customer</th>
<th>Vehicle</th>
<th>Executive</th>
<th>Chase</th>
<th>Amount</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbyTfK8LwqHjv8NzOsPjsNOQrRy49Qfbij6tg0TWvoz6ses2oTG0qvYPwq1ArHXjMPI/exec";

const body=document.getElementById("tableBody");
const totalAmount=document.getElementById("totalAmount");

/* format number */

function format(num){
return Number(num).toLocaleString('en-IN');
}

/* render table */

function render(data){

body.innerHTML="";

let total=0;

data.forEach((r,i)=>{

total+=Number(r.amount);

const tr=document.createElement("tr");

tr.onclick=async()=>{

await fetch(API+"?mode=set_chase&chase="+encodeURIComponent(r.chase)+"&t="+Date.now(),{cache:"no-store"});

location.href="jobcard_arun.html?t="+Date.now();

};

tr.innerHTML=`

<td class="number">${i+1}</td>
<td class="age">${r.age}</td>
<td>${r.aic}</td>
<td>${r.customer}</td>
<td>${r.vehicle}</td>
<td>${r.executive}</td>
<td>${r.chase}</td>
<td class="amount">${format(r.amount)}</td>

`;

body.appendChild(tr);

});

totalAmount.innerText="Total : ₹"+format(total);

}

/* load data */

async function load(){

/* force fresh google sheet data */

await fetch(API+"?mode=refresh&t="+Date.now(),{cache:"no-store"});

const res=await fetch(API+"?mode=arun_fse_detail&t="+Date.now(),{cache:"no-store"});
const data=await res.json();

render(data);

loader.style.display="none";
content.style.display="block";

}

/* always load fresh */

load();

</script>

</body>
</html>
